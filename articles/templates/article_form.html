<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% if object %}Editar{% else %}Crear{% endif %} - Article</title>
  <style>
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:#0b0f14;color:#eaf0ff}
    .wrap{max-width:900px;margin:30px auto;padding:0 16px}
    .box{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);border-radius:16px;padding:18px}
    label{display:block;margin:12px 0 8px;color:#a9b4d0;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
    input,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);color:#eaf0ff;outline:none}
    textarea{min-height:240px;resize:vertical}
    .btn{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);color:#eaf0ff;padding:10px 14px;border-radius:14px;text-decoration:none;font-weight:800;display:inline-flex;gap:8px;cursor:pointer}
    .btn:hover{background:rgba(255,255,255,.06)}
    .primary{border-color:rgba(255,136,0,.45);background:rgba(255,136,0,.10)}
    .row{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="row">
        <div style="color:#a9b4d0;">
          {% if object %}Editando{% else %}Creando{% endif %}
        </div>
        <a class="btn" href="{% url 'articles:list' %}">← Volver</a>
      </div>

      <form method="post">
        {% csrf_token %}

        <label for="id_title">Título</label>
        {{ form.title }}

        <label for="id_content">Contenido</label>
        {{ form.content }}

        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
          <button class="btn primary" type="submit">Guardar</button>
          <a class="btn" href="{% url 'articles:list' %}">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
